<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Commands - Transparent</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="nav-left">
        <a href="./" class="logo-link">
            <img src="assets/images/white_logo.png" alt="Transparent Logo">
            <span class="bot-name">Transparent</span>
        </a>
    </div>

    <nav class="nav-right" id="nav-menu">
        <a href="tos.html">Terms</a>
        <a href="privacy.html">Privacy</a>
        <a href="commands.html">Commands</a>
    </nav>

    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
</header>

<div class="commands-layout">

    <!-- Izquierda: mini panel -->
    <aside class="commands-nav">
        <h3>Jump to</h3>
        <ul>
            <li><a href="#colorize">!colorize</a></li>
            <li><a href="#invertcolors">!invertcolors</a></li>
        </ul>
    </aside>

    <!-- Derecha: comandos -->
    <section class="commands-content">
        <div class="command" id="colorize">
            <h2>!colorize</h2>
            <p><strong>Function:</strong> Apply a color filter to an image.</p>
            <p><strong>Parameters:</strong> color (e.g., red, blue, green)</p>
            <p><strong>Example:</strong> <code>!colorize red</code></p>
        </div>

        <div class="command" id="invertcolors">
            <h2>!invertcolors</h2>
            <p><strong>Function:</strong> Invert the colors of an image.</p>
            <p><strong>Parameters:</strong> none</p>
            <p><strong>Example:</strong> <code>!invertcolors</code></p>
        </div>
    </section>

</div>

</body>
</html>
